# LiteLLM Proxy config for AI Factory
# Deploy as separate service (e.g. Render); set OPENAI_API_KEY, ANTHROPIC_API_KEY in env.
# Callers use model = "auto/chat" | "fast/chat" | "max/chat" for routing tier.

model_list:
  - model_name: auto/chat
    litellm_params:
      model: gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: chat
  - model_name: auto/chat
    litellm_params:
      model: gpt-4o
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: chat
  - model_name: fast/chat
    litellm_params:
      model: gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: chat
  - model_name: max/chat
    litellm_params:
      model: gpt-4o
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: chat
  - model_name: max/chat
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      mode: chat

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 60
  default_fallbacks: ["auto/chat"]

# Response caching: Redis requires a reachable REDIS_URL and correct LiteLLM host wiring.
# Misconfigured REDIS caused gateway startup httpx.ConnectError on Render. Enable when REDIS_URL is set:
#   cache: true
#   cache_params: { type: redis, host: ..., ttl: 3600, namespace: ai-factory }
cache: false

# Langfuse callbacks are NOT enabled here by default: LiteLLM may call Langfuse during startup;
# a bad or unreachable LANGFUSE_HOST (or missing cloud URL) causes httpx.ConnectError and exit 3.
# When Langfuse is up, set env LANGFUSE_HOST (e.g. https://cloud.langfuse.com), LANGFUSE_PUBLIC_KEY,
# LANGFUSE_SECRET_KEY on the gateway service and add:
#   litellm_settings:
#     success_callback: ["langfuse"]
#     failure_callback: ["langfuse"]
litellm_settings:
  cache_params:
    supported_call_types: ["completion", "acompletion"]
