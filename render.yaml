# Render Blueprint: AI Factory Control Plane
# Two services, branch-based: main = staging, prod = production.
# After first sync in Render Dashboard (New > Blueprint), deploys auto-trigger on git push.
# Set DATABASE_URL and CORS_ORIGIN per service in Render Dashboard > Environment.

services:
  - type: web
    name: ai-factory-api-staging
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.control-plane
    branch: main
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (staging), CORS_ORIGIN (staging console URL)
    healthCheckPath: /health

  - type: web
    name: ai-factory-api-prod
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.control-plane
    branch: prod
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (prod), CORS_ORIGIN (prod console URL)
    healthCheckPath: /health
