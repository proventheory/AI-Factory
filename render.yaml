# Render Blueprint: AI Factory Control Plane + Runner + LLM Gateway
# Set in Dashboard: DATABASE_URL, CORS_ORIGIN (API), CONTROL_PLANE_URL + LLM_GATEWAY_URL or OPENAI_API_KEY (runner).
# Gateway: set OPENAI_API_KEY and optionally ANTHROPIC_API_KEY on ai-factory-gateway-staging; then set LLM_GATEWAY_URL on runner to this service URL.
#
# Control Plane (API) self-heal: migrations run on every start when built from GitHub (or any deploy) only if:
#   - dockerContext: .   (repo root; leave Root Directory blank so context is full repo)
#   - dockerfilePath: ./Dockerfile.control-plane   (or control-plane/Dockerfile with context .)
#   - Start Command: leave EMPTY so the image CMD runs migrate then the API.
# If Root Directory is set to control-plane, or Start Command overrides CMD, the image may omit migrations and Console shows "Control Plane database schema is missing."

services:
  - type: web
    name: ai-factory-gateway-staging
    runtime: docker
    plan: standard
    dockerContext: .
    dockerfilePath: ./Dockerfile.gateway
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      # Set in Dashboard: OPENAI_API_KEY (required), ANTHROPIC_API_KEY (optional), REDIS_URL (optional)
    healthCheckPath: /health/readiness

  - type: web
    name: ai-factory-api-staging
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.control-plane
    # Start Command: leave unset so image CMD runs migrate then API (self-heal)
    branch: main
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (staging), CORS_ORIGIN (staging console URL)
    healthCheckPath: /health

  - type: web
    name: ai-factory-runner-staging
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.runner
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      # Render sets PORT for web services; runner listens for GET /health so service check (and MCP) can pass. Set in Dashboard: DATABASE_URL (same as API), CONTROL_PLANE_URL, and either LLM_GATEWAY_URL or OPENAI_API_KEY
    healthCheckPath: /health

  - type: web
    name: ai-factory-api-prod
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.control-plane
    # Start Command: leave unset so image CMD runs migrate then API (self-heal)
    branch: prod
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (prod), CORS_ORIGIN (prod console URL)
    healthCheckPath: /health
