# Render Blueprint: AI Factory Control Plane + Runner + LLM Gateway
#
# Service URLs (set in Dashboard per service):
#   Runner: CONTROL_PLANE_URL = API service URL (e.g. https://ai-factory-api-staging.onrender.com); LLM_GATEWAY_URL = gateway service URL (or set OPENAI_API_KEY to call OpenAI directly).
#   API: CORS_ORIGIN = Console URL (e.g. https://your-console.vercel.app). Optional RATE_LIMIT_MAX_PER_MIN (default 300).
#   API: SHOPIFY_CONNECTOR_ENCRYPTION_KEY = required to store Shopify client secrets or Admin API tokens (shpat_) on brands.
#   Runner: same key (or WOO_COMMERCE_CONNECTOR_ENCRYPTION_KEY with the identical secret) so jobs can decrypt tokens for PDF/blog/tag migrations.
#   API + Runner: DATABASE_URL (same Supabase/Neon pooler URL). Optional DATABASE_POOL_MAX (default 10 in code; set lower if pooler caps connections). Optional DATABASE_CONNECTION_TIMEOUT_MS (default 20000).
# Gateway: OPENAI_API_KEY (required), ANTHROPIC_API_KEY (optional), REDIS_URL (optional, for caching).
#
# Health paths: API and Runner use /health; Gateway uses /health/readiness (LiteLLM convention).
#
# Self-heal (Control Plane): ENABLE_SELF_HEAL=true, RENDER_API_KEY, RENDER_STAGING_SERVICE_IDS (api, gateway, runner IDs), optionally VERCEL_TOKEN + VERCEL_PROJECT_IDS. See docs/OPERATIONS_RUNBOOK.md.
#
# Docker: All services use dockerContext: . (repo root). Control Plane API: Dockerfile.control-plane; API binds first then in-process SQL migrations (SKIP_STARTUP_MIGRATIONS=true to skip). Optional DATABASE_URL_MIGRATE for DDL if pooler rejects statements.

services:
  - type: web
    name: ai-factory-gateway-staging
    runtime: docker
    plan: standard
    dockerContext: .
    dockerfilePath: ./Dockerfile.gateway
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      # Set in Dashboard: OPENAI_API_KEY (required), ANTHROPIC_API_KEY (optional), REDIS_URL (optional)
    healthCheckPath: /health/readiness

  - type: web
    name: ai-factory-gateway-prod
    runtime: docker
    plan: standard
    dockerContext: .
    dockerfilePath: ./Dockerfile.gateway
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      # Set in Dashboard: OPENAI_API_KEY (required), ANTHROPIC_API_KEY (optional), REDIS_URL (optional)
    healthCheckPath: /health/readiness

  - type: web
    name: ai-factory-api-staging
    runtime: docker
    # Repo root only. Do NOT set Dashboard "Root Directory" to control-plane — Docker context would omit scripts/ + supabase/ and startup migrations would fail.
    dockerContext: .
    dockerfilePath: ./Dockerfile.control-plane
    # Leave Start Command and dockerCommand unset: image CMD runs the bundle; migrations run in-process after /health is up (control-plane/src/index.ts).
    branch: main
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (staging), CORS_ORIGIN (staging console URL). Optional: DATABASE_POOL_MAX, DATABASE_URL_MIGRATE (direct DB for migrations), SKIP_STARTUP_MIGRATIONS=true (debug only). Health check timeout: increase in Dashboard if first deploy is slow.
    healthCheckPath: /health

  - type: web
    name: ai-factory-runner-staging
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.runner
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      # Render sets PORT for web services; runner listens for GET /health. Set in Dashboard: DATABASE_URL (same as API), CONTROL_PLANE_URL, LLM_GATEWAY_URL or OPENAI_API_KEY. Optional: DATABASE_POOL_MAX.
    healthCheckPath: /health

  - type: web
    name: ai-factory-api-prod
    runtime: docker
    # Same as staging: repo-root context only; never set Root Directory = control-plane in Dashboard.
    dockerContext: .
    dockerfilePath: ./Dockerfile.control-plane
    branch: prod
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (prod), CORS_ORIGIN (prod console URL)
    healthCheckPath: /health
