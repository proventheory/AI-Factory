# Render Blueprint: AI Factory Control Plane + Runner + LLM Gateway
# Set in Dashboard: DATABASE_URL, CORS_ORIGIN (API), CONTROL_PLANE_URL + LLM_GATEWAY_URL or OPENAI_API_KEY (runner).
# Gateway: set OPENAI_API_KEY and optionally ANTHROPIC_API_KEY on ai-factory-gateway-staging; then set LLM_GATEWAY_URL on runner to this service URL.

services:
  - type: web
    name: ai-factory-gateway-staging
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.gateway
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      # Set in Dashboard: OPENAI_API_KEY (required), ANTHROPIC_API_KEY (optional), REDIS_URL (optional)
    healthCheckPath: /health/readiness

  - type: web
    name: ai-factory-api-staging
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.control-plane
    branch: main
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (staging), CORS_ORIGIN (staging console URL)
    healthCheckPath: /health

  - type: worker
    name: ai-factory-runner-staging
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.runner
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (same as API), CONTROL_PLANE_URL, and either LLM_GATEWAY_URL or OPENAI_API_KEY

  - type: web
    name: ai-factory-api-prod
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.control-plane
    branch: prod
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (prod), CORS_ORIGIN (prod console URL)
    healthCheckPath: /health
