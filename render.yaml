# Render Blueprint: AI Factory Control Plane + Runner worker
# Two web services (API), one background worker (runner). Set DATABASE_URL, CORS_ORIGIN (API), CONTROL_PLANE_URL, LLM_GATEWAY_URL (runner) in Dashboard.

services:
  - type: web
    name: ai-factory-api-staging
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.control-plane
    branch: main
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (staging), CORS_ORIGIN (staging console URL)
    healthCheckPath: /health

  - type: worker
    name: ai-factory-runner-staging
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.runner
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (same as API), CONTROL_PLANE_URL (e.g. https://ai-factory-api-staging.onrender.com), LLM_GATEWAY_URL

  - type: web
    name: ai-factory-api-prod
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.control-plane
    branch: prod
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # Set in Dashboard: DATABASE_URL (prod), CORS_ORIGIN (prod console URL)
    healthCheckPath: /health
